services:
  db:
    image: postgres:15
    container_name: postgres_tc
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tech_challenge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tech_challenge"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: node_tc
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tech_challenge
    command: sh -c "npm install && npx prisma migrate deploy && npm run dev"

  frontend:
    build: ./frontend
    container_name: react_tc
    ports:
      - "5173:5173"
    depends_on:
      - app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pgdata:
  app_node_modules:
  frontend_node_modules:
